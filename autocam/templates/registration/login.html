<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCam – Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }
        h1 { color: #00d9ff; font-size: 22px; margin-bottom: 8px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 28px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 6px; }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 10px 14px;
            background: #0f3460;
            border: 1px solid #1a2a4a;
            border-radius: 5px;
            color: #eee;
            font-size: 14px;
            margin-bottom: 18px;
            outline: none;
        }
        input[type=text]:focus, input[type=password]:focus {
            border-color: #00d9ff;
        }
        button[type=submit] {
            width: 100%;
            padding: 11px;
            background: #00d9ff;
            color: #16213e;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type=submit]:hover { background: #00b8d4; }
        .error {
            background: #e94560;
            color: #fff;
            padding: 10px 14px;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>AutoCam Control</h1>
        <p class="subtitle">Sign in to continue</p>
        {% if form.errors %}
            <div class="error">Invalid username or password.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <label for="id_username">Username</label>
            <input type="text" id="id_username" name="username" autofocus autocomplete="username">
            <label for="id_password">Password</label>
            <input type="password" id="id_password" name="password" autocomplete="current-password">
            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
