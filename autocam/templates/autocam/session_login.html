<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCam – {{ server.name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 360px;
        }
        h1 { color: #00d9ff; font-size: 22px; margin-bottom: 4px; }
        .session-name { color: #ccc; font-size: 15px; margin-bottom: 24px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 6px; }
        input[type=password] {
            width: 100%;
            padding: 10px 14px;
            background: #0f3460;
            border: 1px solid #1a2a4a;
            border-radius: 5px;
            color: #eee;
            font-size: 14px;
            margin-bottom: 18px;
            outline: none;
        }
        input[type=password]:focus { border-color: #00d9ff; }
        button[type=submit] {
            width: 100%;
            padding: 11px;
            background: #00d9ff;
            color: #16213e;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type=submit]:hover { background: #00b8d4; }
        .error {
            background: #e94560;
            color: #fff;
            padding: 10px 14px;
            border-radius: 5px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .back { margin-top: 18px; text-align: center; }
        .back a { color: #888; font-size: 13px; text-decoration: none; }
        .back a:hover { color: #00d9ff; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>AutoCam Control</h1>
        <p class="session-name">{{ server.name }}</p>
        {% if error %}
            <div class="error">Incorrect password.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label for="password">Session password</label>
            <input type="password" id="password" name="password" autofocus autocomplete="current-password">
            <button type="submit">Enter</button>
        </form>
        <div class="back"><a href="{% url 'autocam:control' %}">← All sessions</a></div>
    </div>
</body>
</html>
